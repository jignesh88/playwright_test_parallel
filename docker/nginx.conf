server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Landing page lists the available reports.
    location = / {
        try_files /index.html =404;
    }

    # Each suite's report is mounted at /reports/<suite>/.
    # Allure ships static SPA assets; index.html for directory requests.
    location /reports/ {
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # JSON / data files shouldn't be cached aggressively either — reports get
    # rebuilt per CI run.
    location ~* \.(json|csv|txt)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
